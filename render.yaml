services:
  - type: web
    name: goal-portal-api
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_COOKIE_NAME
        value: goal_portal_token
      - key: JWT_COOKIE_SAME_SITE
        value: none
      - key: CLIENT_ORIGIN
        value: https://project-management-and-goal-tracker.vercel.app
      - key: CLIENT_ORIGINS
        value: https://project-management-and-goal-tracker.vercel.app
