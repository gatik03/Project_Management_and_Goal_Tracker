services:
  - type: web
    name: goal-portal-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_COOKIE_NAME
        value: goal_portal_token
      - key: JWT_COOKIE_SAME_SITE
        value: none
      - key: CLIENT_ORIGIN
        sync: false
      - key: CLIENT_ORIGINS
        sync: false
